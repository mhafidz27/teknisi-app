<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teknisi Field App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; justify-content: center; padding: 1.5rem 1rem 3rem; }
    .container { width: 100%; max-width: 420px; }
    .logo { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 1.5rem; letter-spacing: 0.5px; }
    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 13px; color: #888; margin-bottom: 6px; }
    .card-value { font-size: 20px; font-weight: 500; color: #111; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
    select, input[type="text"] { width: 100%; padding: 10px 12px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; font-size: 15px; color: #111; background: #fff; margin-bottom: 1rem; appearance: none; -webkit-appearance: none; outline: none; }
    select:focus, input[type="text"]:focus { border-color: rgba(0,0,0,0.4); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
    .btn-primary { width: 100%; padding: 14px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary:active:not(:disabled) { opacity: 0.85; transform: scale(0.98); }
    .success-box { background: #eaf3de; border: 0.5px solid #8ec44a; border-radius: 12px; padding: 1.5rem 1.25rem; text-align: center; display: none; }
    .success-box i { font-size: 36px; color: #3b6d11; margin-bottom: 8px; display: block; }
    .success-title { font-size: 17px; font-weight: 500; color: #27500a; margin-bottom: 4px; }
    .success-sub { font-size: 13px; color: #3b6d11; }
    .badge { display: inline-block; background: #fff; border-radius: 8px; padding: 4px 12px; font-size: 13px; color: #444; margin-top: 10px; border: 0.5px solid rgba(0,0,0,0.1); }
    .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 1.5rem 0; }
    .section-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 10px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
    .history-item:last-child { border-bottom: none; }
    .h-job { font-size: 14px; font-weight: 500; color: #111; }
    .h-nama { font-size: 12px; color: #888; margin-top: 2px; }
    .h-time { font-size: 13px; font-weight: 500; color: #111; }
    .empty-state { text-align: center; padding: 2rem 0; font-size: 13px; color: #aaa; }
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-row input { margin-bottom: 0; flex: 1; }
    .btn-search { padding: 10px 14px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn-search:disabled { opacity: 0.4; cursor: not-allowed; }
    .ron-result { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; display: none; }
    .ron-result.show { display: block; }
    .ron-result-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .ron-result-value { font-size: 14px; font-weight: 500; color: #111; margin-bottom: 10px; }
    .ron-result-value:last-child { margin-bottom: 0; }
    .ron-confirm { display: flex; gap: 8px; margin-top: 12px; }
    .ron-confirm button { flex: 1; padding: 9px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }
    .btn-confirm { background: #111; color: #fff; }
    .btn-reset-ron { background: transparent; border: 0.5px solid rgba(0,0,0,0.2) !important; color: #111; }
    .ron-locked { background: #f5f5f0; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; display: none; }
    .ron-locked.show { display: block; }
    .ron-locked-title { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .btn-ganti-ron { background: none; border: none; font-size: 12px; color: #888; cursor: pointer; text-decoration: underline; }
    .ron-locked-ron { font-size: 15px; font-weight: 500; color: #111; }
    .ron-locked-sub { font-size: 12px; color: #888; margin-top: 2px; }
    .multiple-results { display: none; }
    .multiple-results.show { display: block; }
    .result-option { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; }
    .result-option:hover { border-color: #111; }
    .result-option-ron { font-size: 13px; font-weight: 500; color: #111; }
    .result-option-sub { font-size: 12px; color: #888; margin-top: 2px; }
  </style>
</head>
<body>
<div class="container">
  <p class="logo"><i class="ti ti-briefcase"></i> Teknisi Field App</p>
  <div id="form-section">
    <div class="card">
      <p class="card-title">Waktu sekarang</p>
      <p class="card-value" id="current-time">--:--:--</p>
    </div>

    <label>Cari RON (4 angka terakhir)</label>
    <div class="search-row">
      <input type="text" id="ron-search" placeholder="Contoh: 9605" maxlength="4" inputmode="numeric" />
      <button class="btn-search" id="btn-search" onclick="searchRON()"><i class="ti ti-search"></i> Cari</button>
    </div>

    <div class="multiple-results" id="multiple-results">
      <p style="font-size:13px;color:#888;margin-bottom:8px;">Ditemukan beberapa hasil, pilih yang sesuai:</p>
      <div id="result-list"></div>
    </div>

    <div class="ron-result" id="ron-result">
      <div class="ron-result-label">Nomor RON</div>
      <div class="ron-result-value" id="res-ron">--</div>
      <div class="ron-result-label">Nama Customer</div>
      <div class="ron-result-value" id="res-cust">--</div>
      <div class="ron-result-label">Kategori</div>
      <div class="ron-result-value" id="res-cat">--</div>
      <div class="ron-confirm">
        <button class="btn-confirm" onclick="confirmRON()">✓ Ini yang dimaksud</button>
        <button class="btn-reset-ron" onclick="resetRON()">✕ Bukan ini</button>
      </div>
    </div>

    <div class="ron-locked" id="ron-locked">
      <div class="ron-locked-title">
        <span>RON Terkonfirmasi ✓</span>
        <button class="btn-ganti-ron" onclick="resetRON()">Ganti</button>
      </div>
      <div class="ron-locked-ron" id="locked-ron">--</div>
      <div class="ron-locked-sub" id="locked-sub">--</div>
    </div>

    <label for="nama">Pilih teknisi</label>
    <select id="nama"><option value="">Memuat daftar...</option></select>

    <button class="btn-primary" id="btn-mulai" onclick="handleMulai()">
      <i class="ti ti-player-play"></i> Mulai Kerja
    </button>
  </div>

  <div class="success-box" id="success-box">
    <i class="ti ti-circle-check"></i>
    <p class="success-title" id="success-title">Berhasil dicatat!</p>
    <p class="success-sub" id="success-sub">--</p>
    <span class="badge" id="success-time">--</span>
    <br>
    <button class="btn-primary" style="margin-top:1.25rem;" onclick="resetForm()">
      <i class="ti ti-plus"></i> Catat job lain
    </button>
  </div>

  <hr class="divider">
  <p class="section-title"><i class="ti ti-history"></i> Riwayat sesi ini</p>
  <div id="history-list"><div class="empty-state">Belum ada data</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
  var API_URL = "https://script.google.com/macros/s/AKfycbzyRFIpMJxe0544PgHJX0lGEB7kwOZOvJKvtZ7e4Xg1fCX2htLMLiAWbeSxrDJLLTVolg/exec";
  var sessionRecords = [];
  var selectedRON = null;
  var _cbIndex = 0;

  function tick() { document.getElementById('current-time').textContent = new Date().toLocaleTimeString('id-ID'); }
  tick(); setInterval(tick, 1000);

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  // JSONP helper — bypass CORS
  function jsonp(url, callback) {
    var cbName = '_cb' + (++_cbIndex);
    window[cbName] = function(data) {
      delete window[cbName];
      document.getElementById('_jsonp_' + cbName) && document.getElementById('_jsonp_' + cbName).remove();
      callback(data);
    };
    var s = document.createElement('script');
    s.id = '_jsonp_' + cbName;
    s.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cbName;
    s.onerror = function() {
      delete window[cbName];
      s.remove();
      callback(null);
    };
    document.head.appendChild(s);
  }

  function loadTeknisi() {
    jsonp(API_URL + '?action=getTeknisi', function(data) {
      var sel = document.getElementById('nama');
      if (data && data.status === 'ok' && data.teknisi.length > 0) {
        sel.innerHTML = '<option value="">-- Pilih nama --</option>';
        data.teknisi.forEach(function(n) {
          var o = document.createElement('option');
          o.value = n; o.textContent = n; sel.appendChild(o);
        });
      } else {
        sel.innerHTML = '<option value="">Gagal memuat</option>';
        showToast('Gagal load teknisi');
      }
    });
  }

  function searchRON() {
    var q = document.getElementById('ron-search').value.trim();
    if (q.length !== 4) { showToast('Masukkan tepat 4 angka!'); return; }
    var btn = document.getElementById('btn-search');
    btn.disabled = true;
    btn.innerHTML = '⏳';
    document.getElementById('ron-result').classList.remove('show');
    document.getElementById('multiple-results').classList.remove('show');
    document.getElementById('ron-locked').classList.remove('show');
    selectedRON = null;

    jsonp(API_URL + '?action=searchRON&q=' + q, function(data) {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-search"></i> Cari';
      if (!data || data.status !== 'ok' || data.results.length === 0) {
        showToast('RON tidak ditemukan!'); return;
      }
      if (data.results.length === 1) {
        showSingleResult(data.results[0]);
      } else {
        showMultipleResults(data.results);
      }
    });
  }

  function showSingleResult(item) {
    document.getElementById('res-ron').textContent = item.ron;
    document.getElementById('res-cust').textContent = item.cust_name;
    document.getElementById('res-cat').textContent = item.category;
    document.getElementById('ron-result').classList.add('show');
    selectedRON = item;
  }

  function showMultipleResults(items) {
    var el = document.getElementById('result-list');
    el.innerHTML = items.map(function(item, i) {
      return '<div class="result-option" onclick="pickRON(' + i + ')"><div class="result-option-ron">' + item.ron + '</div><div class="result-option-sub">' + item.cust_name + ' · ' + item.category + '</div></div>';
    }).join('');
    document.getElementById('multiple-results').classList.add('show');
    window._ronResults = items;
  }

  function pickRON(i) {
    document.getElementById('multiple-results').classList.remove('show');
    showSingleResult(window._ronResults[i]);
  }

  function confirmRON() {
    if (!selectedRON) return;
    document.getElementById('ron-result').classList.remove('show');
    document.getElementById('ron-locked').classList.add('show');
    document.getElementById('locked-ron').textContent = selectedRON.ron;
    document.getElementById('locked-sub').textContent = selectedRON.cust_name + ' · ' + selectedRON.category;
  }

  function resetRON() {
    selectedRON = null;
    document.getElementById('ron-result').classList.remove('show');
    document.getElementById('ron-locked').classList.remove('show');
    document.getElementById('multiple-results').classList.remove('show');
    document.getElementById('ron-search').value = '';
  }

  function handleMulai() {
    if (!selectedRON) { showToast('Cari dan konfirmasi RON dulu!'); return; }
    var nama = document.getElementById('nama').value;
    if (!nama) { showToast('Pilih nama teknisi dulu!'); return; }
    var btn = document.getElementById('btn-mulai');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader"></i> Menyimpan...';
    var now = new Date();

    // POST via form submit trick (bypass CORS for POST)
    var form = document.createElement('form');
    form.method = 'POST';
    form.action = API_URL;
    form.target = '_hidden_frame';
    var payload = document.createElement('input');
    payload.type = 'hidden';
    payload.name = 'payload';
    payload.value = JSON.stringify({
      action: 'submitJob',
      nama: nama,
      jobId: selectedRON.ron,
      ron: selectedRON.ron,
      custName: selectedRON.cust_name,
      category: selectedRON.category,
      timestamp: now.toISOString()
    });
    form.appendChild(payload);

    var iframe = document.getElementById('_hidden_frame');
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.name = '_hidden_frame';
      iframe.id = '_hidden_frame';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }

    iframe.onload = function() {
      var timeStr = now.toLocaleTimeString('id-ID');
      var dateStr = now.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      sessionRecords.push({ nama: nama, jobId: selectedRON.ron, cust: selectedRON.cust_name, timeStr: timeStr });
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-box').style.display = 'block';
      document.getElementById('success-title').textContent = selectedRON.ron;
      document.getElementById('success-sub').textContent = selectedRON.cust_name + ' · ' + dateStr;
      document.getElementById('success-time').textContent = '⏱ Mulai kerja: ' + timeStr;
      renderHistory();
    };

    document.body.appendChild(form);
    form.submit();
    form.remove();

    setTimeout(function() {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-player-play"></i> Mulai Kerja';
    }, 3000);
  }

  function resetForm() {
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('success-box').style.display = 'none';
    document.getElementById('nama').value = '';
    resetRON();
    var btn = document.getElementById('btn-mulai');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-player-play"></i> Mulai Kerja';
  }

  function renderHistory() {
    var el = document.getElementById('history-list');
    if (sessionRecords.length === 0) { el.innerHTML = '<div class="empty-state">Belum ada data</div>'; return; }
    el.innerHTML = sessionRecords.slice().reverse().map(function(r) {
      return '<div class="history-item"><div><div class="h-job">' + r.jobId + '</div><div class="h-nama">' + r.nama + ' · ' + r.cust + '</div></div><div class="h-time">' + r.timeStr + '</div></div>';
    }).join('');
  }

  document.getElementById('ron-search').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchRON();
  });

  loadTeknisi();
</script>
</body>
</html>
